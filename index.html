const TL_DAY_W=46;
const TL_PROP_W=80;
const TL_BEFORE=30;  // days before today to render
const TL_AFTER=150;  // days after today to render

function daysBetween(a,b){
  const pa=a.split('-'),pb=b.split('-');
  const da=new Date(+pa[0],+pa[1]-1,+pa[2]),db=new Date(+pb[0],+pb[1]-1,+pb[2]);
  return Math.round((db-da)/(1000*60*60*24));
}

function renderCalendarTimeline(){
  const td=today();
  const winStart=addDays(td,-TL_BEFORE);
  const winEnd=addDays(td,TL_AFTER);
  const totalDays=TL_BEFORE+TL_AFTER+1;

  // Build days array
  const days=[];for(let i=0;i<totalDays;i++)days.push(addDays(winStart,i));

  // Which properties to show
  const filterPropId=calFilter.startsWith('prop-')?calFilter.slice(5):null;
  const props=filterPropId?D.props.filter(p=>p.id===filterPropId):D.props;

  // "Today" snap button + legend row
  let h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    +'<div style="font-size:11px;color:var(--text3);font-weight:600">Scroll to navigate · tap booking for details</div>'
    +'<button class="week-today-btn" onclick="tlScrollToday()">↩ Today</button>'
    +'</div>';

  if(!props.length){
    h+='<div class="empty">No properties yet</div>';
    return h;
  }

  h+='<div class="tl-outer" id="tl-outer"><div class="tl-inner">';

  // ── Header row ──
  h+='<div class="tl-hdr-row"><div class="tl-corner"></div>';
  days.forEach((d,i)=>{
    const parts=d.split('-');
    const dObj=new Date(+parts[0],+parts[1]-1,+parts[2]);
    const dow=dObj.getDay();
    const isT=d===td;
    const isWk=dow===0||dow===6;
    // Show month label on 1st of month or first day in array
    const isFirst=+parts[2]===1||i===0;
    const dayName=dObj.toLocaleDateString('en-GB',{weekday:'short'}).slice(0,2);
    const dayNum=parts[2].replace(/^0/,'');
    const monthName=isFirst?dObj.toLocaleDateString('en-GB',{month:'short'}):'';
    h+='<div class="tl-day-hdr'+(isT?' is-today':'')+'"'+(isT?' id="tl-today-hdr"':'')+' style="background:'+(isT?'rgba(26,122,94,0.08)':isWk?'var(--surface2)':'transparent')+'">'
      +(monthName?'<div style="font-size:8px;font-weight:800;color:var(--accent);letter-spacing:0.05em;line-height:1;margin-bottom:1px">'+monthName.toUpperCase()+'</div>':'<div style="font-size:8px;line-height:1;margin-bottom:1px">&nbsp;</div>')
      +'<div class="tl-day-hdr-name">'+dayName+'</div>'
      +'<div class="tl-day-hdr-num">'+dayNum+'</div>'
      +'</div>';
  });
  h+='</div>';

  // ── Property rows ──
  props.forEach(prop=>{
    const clr=propBarColor(prop.id);
    const bks=D.bookings.filter(b=>
      b.propId===prop.id&&b.status!=='cancelled'&&
      b.checkIn<=winEnd&&b.checkOut>winStart
    ).sort((a,b)=>a.checkIn.localeCompare(b.checkIn));
    const cleans=D.sessions.filter(s=>
      s.propId===prop.id&&s.date>=winStart&&s.date<=winEnd&&s.status!=='cancelled'
    );
    const shortName=prop.name.replace(/^Villa\s+/i,'').replace(/^Can\s+/i,'');

    h+='<div class="tl-prop-row">';
    h+='<div class="tl-prop-label">'
      +'<div class="tl-prop-label-dot" style="background:'+clr.border+'"></div>'
      +'<div class="tl-prop-label-text">'+esc(shortName)+'</div>'
      +'</div>';
    h+='<div class="tl-row-body">';

    // Background day cells
    days.forEach(d=>{
      const parts=d.split('-');
      const dow=new Date(+parts[0],+parts[1]-1,+parts[2]).getDay();
      const isT=d===td;
      const isWk=dow===0||dow===6;
      const hasClean=cleans.some(s=>s.date===d);
      // Month boundary line on 1st of month
      const isFirst=+parts[2]===1;
      h+='<div class="tl-day-cell'+(isT?' is-today':'')+(isWk?' is-weekend':'')+'"'
        +' style="'+(isFirst?'border-left:2px solid var(--border2);':'')+'">'
        +(hasClean?'<div class="tl-clean">🧹</div>':'')
        +'</div>';
    });

    // Booking blocks
    bks.forEach(b=>{
      // Bar: starts at left edge of checkIn day, ends at MIDPOINT of checkOut day (Airbnb style)
      const checkInOff=daysBetween(winStart,b.checkIn);
      const checkOutOff=daysBetween(winStart,b.checkOut);

      if(checkInOff>totalDays-1)return; // starts after window
      if(checkOutOff<0)return;          // ends before window

      const clampedIn=Math.max(checkInOff,0);
      const clampedOut=Math.min(checkOutOff,totalDays-1);

      const startsInWin=checkInOff>=0;
      const endsInWin=checkOutOff<=totalDays-1;

      // Left: start of checkIn column + small padding
      const leftPx=clampedIn*TL_DAY_W+2;
      // Right: middle of checkOut column (or full width if clipped beyond window)
      const rightPx=endsInWin
        ?clampedOut*TL_DAY_W+Math.floor(TL_DAY_W/2)
        :totalDays*TL_DAY_W;
      const widthPx=rightPx-leftPx-2;
      if(widthPx<4)return;

      let rCls;
      if(startsInWin&&endsInWin)rCls='tl-r-both';
      else if(startsInWin)rCls='tl-r-clip-end';
      else if(endsInWin)rCls='tl-r-clip-start';
      else rCls='tl-r-clip-both';

      // Label based on number of nights (cells between checkIn and checkOut)
      const nights=checkOutOff-checkInOff;
      let label='';
      if(nights>=5&&b.guestName)label=b.guestName.split(' ')[0];
      else if(nights>=3&&b.guestName)label=b.guestName.split(' ')[0].slice(0,5);
      else if(nights>=2&&b.guestName)label=b.guestName.split(' ')[0].slice(0,3);

      const inDot=startsInWin?'<div style="width:6px;height:6px;border-radius:50%;background:'+clr.border+';flex-shrink:0;margin-right:'+(label?3:0)+'px;opacity:0.85"></div>':'';
      h+='<div class="tl-bk '+rCls+'" style="left:'+leftPx+'px;width:'+widthPx+'px;background:'+clr.bg+';border-color:'+clr.border+'" onclick="openBookingDetail(\''+b.id+'\')">'
        +inDot
        +(label?'<span class="tl-bk-text" style="color:'+clr.text+'">'+esc(label)+'</span>':'')
        +'</div>';
    });

    h+='</div></div>'; // row-body, prop-row
  });

  h+='</div></div>'; // tl-inner, tl-outer

  // Legend
  h+='<div class="tl-legend">'
    +'<div class="tl-legend-item"><div style="width:22px;height:11px;border-radius:4px;background:var(--accent-bg);border:1.5px solid var(--accent)"></div>Booking</div>'
    +'<div class="tl-legend-item">🧹 Cleaning</div>'
    +'<div class="tl-legend-item"><div style="width:6px;height:6px;border-radius:50%;background:var(--text2);display:inline-block;margin-right:2px"></div>Check-in</div>'
    +'<div style="font-size:10px;color:var(--text3);font-weight:600;margin-left:auto">│ = new month</div>'
    +'</div>';

  // Auto-scroll to today after render
  h+='<script>requestAnimationFrame(()=>tlScrollToday());<\/script>';

  return h;
}

function tlScrollToday(){
  const outer=document.getElementById('tl-outer');
  const hdr=document.getElementById('tl-today-hdr');
  if(!outer||!hdr)return;
  // Scroll so today is ~80px from the left edge of the visible area
  outer.scrollLeft=hdr.offsetLeft-TL_PROP_W-20;
}

function renderCalendarMonth(){
  if(!calWeekStart)calWeekStart=startOfWeek();
  const winStart=calWeekStart;
  const winEnd=addDays(winStart,13); // 14 days
  const td=today();

  // Which properties to show
  const filterPropId=calFilter.startsWith('prop-')?calFilter.slice(5):null;
  const props=filterPropId?D.props.filter(p=>p.id===filterPropId):D.props;

  // Build 14 days array
  const days=[];for(let i=0;i<14;i++)days.push(addDays(winStart,i));

  // Navigation
  let h='<div class="week-nav" style="margin-bottom:10px">'
    +'<button class="week-nav-btn" onclick="calWeekStart=addDays(calWeekStart,-7);render()">'
    +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>'
    +'<div style="display:flex;flex-direction:column;align-items:center;gap:3px">'
    +'<span class="week-nav-title">'+fmtDateRange(winStart,winEnd)+'</span>'
    +(winStart!==startOfWeek()?'<button class="week-today-btn" onclick="calWeekStart=startOfWeek();render()">Today</button>':'')
    +'</div>'
    +'<button class="week-nav-btn" onclick="calWeekStart=addDays(calWeekStart,7);render()">'
    +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></button>'
    +'</div>';

  if(!props.length){
    h+='<div class="empty">No properties yet — add one in Properties tab</div>';
    return h;
  }

  h+='<div class="tl-outer"><div class="tl-inner">';

  // ── Header row ──
  h+='<div class="tl-hdr-row">'
    +'<div class="tl-corner"></div>';
  days.forEach(d=>{
    const parts=d.split('-');
    const dow=new Date(+parts[0],+parts[1]-1,+parts[2]).getDay();
    const isT=d===td;
    const isWk=dow===0||dow===6;
    const dayName=new Date(+parts[0],+parts[1]-1,+parts[2]).toLocaleDateString('en-GB',{weekday:'short'}).slice(0,2);
    h+='<div class="tl-day-hdr'+(isT?' is-today':'')+'" style="background:'+(isWk&&!isT?'var(--surface2)':isT?'rgba(26,122,94,0.07)':'transparent')+'">'
      +'<div class="tl-day-hdr-name">'+dayName+'</div>'
      +'<div class="tl-day-hdr-num">'+parts[2].replace(/^0/,'')+'</div>'
      +'</div>';
  });
  h+='</div>';

  // ── Property rows ──
  props.forEach(prop=>{
    const clr=propBarColor(prop.id);
    const showClean=calFilter!=='cleanings'||true; // always show clean icons in timeline

    // Bookings overlapping this window for this property
    const bks=D.bookings.filter(b=>
      b.propId===prop.id&&
      b.status!=='cancelled'&&
      b.checkIn<=winEnd&&
      b.checkOut>winStart
    ).sort((a,b)=>a.checkIn.localeCompare(b.checkIn));

    // Cleaning sessions in window for this property
    const cleans=D.sessions.filter(s=>s.propId===prop.id&&s.date>=winStart&&s.date<=winEnd&&s.status!=='cancelled');

    // Short property name (remove "Villa" prefix to save space)
    const shortName=prop.name.replace(/^Villa\s+/i,'').replace(/^Can\s+/i,'');

    h+='<div class="tl-prop-row">';

    // Sticky label
    h+='<div class="tl-prop-label">'
      +'<div class="tl-prop-label-dot" style="background:'+clr.border+'"></div>'
      +'<div class="tl-prop-label-text">'+esc(shortName)+'</div>'
      +'</div>';

    // Row body
    h+='<div class="tl-row-body">';

    // Background day cells
    days.forEach(d=>{
      const parts=d.split('-');
      const dow=new Date(+parts[0],+parts[1]-1,+parts[2]).getDay();
      const isT=d===td;
      const isWk=dow===0||dow===6;
      const hasClean=cleans.some(s=>s.date===d);
      h+='<div class="tl-day-cell'+(isT?' is-today':'')+(isWk?' is-weekend':'')+'">'
        +(hasClean?'<div class="tl-clean">🧹</div>':'')
        +'</div>';
    });

    // Booking blocks (absolutely positioned over the day cells)
    bks.forEach(b=>{
      // The block spans from checkIn day to the day BEFORE checkOut (last occupied night)
      const bkFirstDay=b.checkIn; // first night
      const bkLastDay=addDays(b.checkOut,-1); // last occupied night

      // Clamp to window
      const clampedFirst=bkFirstDay<winStart?winStart:bkFirstDay;
      const clampedLast=bkLastDay>winEnd?winEnd:bkLastDay;

      const startOffset=daysBetween(winStart,clampedFirst);
      const endOffset=daysBetween(winStart,clampedLast);

      if(startOffset>13||endOffset<0)return;

      const startsInWindow=bkFirstDay>=winStart;
      const endsInWindow=bkLastDay<=winEnd;

      const leftPx=startOffset*TL_DAY_W+3;
      const widthPx=(endOffset-startOffset+1)*TL_DAY_W-6;
      if(widthPx<4)return;

      // Border radius based on clipping
      let rCls;
      if(startsInWindow&&endsInWindow)rCls='tl-r-both';
      else if(startsInWindow&&!endsInWindow)rCls='tl-r-clip-end';
      else if(!startsInWindow&&endsInWindow)rCls='tl-r-clip-start';
      else rCls='tl-r-clip-both';

      // Label inside block based on available width
      let label='';
      const cells=endOffset-startOffset+1;
      if(cells>=5&&b.guestName)label=b.guestName.split(' ')[0];
      else if(cells>=3&&b.guestName)label=b.guestName.split(' ')[0].slice(0,5);
      else if(cells>=2&&b.guestName)label=b.guestName.split(' ')[0].slice(0,3);

      // Check-in indicator (small circle on left edge if starts in window)
      const inDot=startsInWindow?'<div style="width:6px;height:6px;border-radius:50%;background:'+clr.border+';flex-shrink:0;margin-right:3px;opacity:0.8"></div>':'';

      h+='<div class="tl-bk '+rCls+'" style="left:'+leftPx+'px;width:'+widthPx+'px;background:'+clr.bg+';border-color:'+clr.border+'" onclick="openBookingDetail(\''+b.id+'\')">'
        +inDot
        +(label?'<span class="tl-bk-text" style="color:'+clr.text+'">'+esc(label)+'</span>':'')
        +'</div>';
    });

    h+='</div>'; // row-body
    h+='</div>'; // prop-row
  });

  // Legend
  h+='</div></div>'; // inner, outer
  h+='<div class="tl-legend" style="margin-top:10px">';
  h+='<div class="tl-legend-item"><div style="width:24px;height:12px;border-radius:4px;background:var(--accent-bg);border:1.5px solid var(--accent)"></div>Booking</div>';
  h+='<div class="tl-legend-item">🧹 Cleaning</div>';
  h+='<div class="tl-legend-item"><div style="width:6px;height:6px;border-radius:50%;background:var(--text2);display:inline-block;margin-right:3px"></div>Check-in</div>';
  h+='</div>';

  return h;
}

function renderCalendarMonth(){
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DW=['Mo','Tu','We','Th','Fr','Sa','Su'];
  const fd=new Date(calY,calM,1),ld=new Date(calY,calM+1,0);
  const dow=fd.getDay(),sd=dow===0?6:dow-1;
  const dim=ld.getDate(),pl=new Date(calY,calM,0).getDate();
  let cells=[];
  for(let i=0;i<sd;i++)cells.push({d:pl-sd+1+i,cur:false});
  for(let d=1;d<=dim;d++)cells.push({d,cur:true});
  while(cells.length%7!==0)cells.push({d:cells.length-sd-dim+1,cur:false});
  const td=today();
  const dows=DW.map(d=>'<div class="cal-dow">'+d+'</div>').join('');

  // Determine which bookings/sessions to show based on filter
  const filterPropId=calFilter.startsWith('prop-')?calFilter.slice(5):null;
  const showBookings=calFilter==='all'||filterPropId;
  const showCleanings=calFilter==='all'||calFilter==='cleanings'||filterPropId;

  const cellsH=cells.map(c=>{
    if(!c.cur)return'<div class="cal-day other-month"><div class="cal-num">'+c.d+'</div></div>';
    const ds=calY+'-'+pad(calM+1)+'-'+pad(c.d);
    const isT=ds===td;

    // Booking bars for this day
    let bkBarsHtml='';
    if(showBookings){
      let bksOnDay=D.bookings.filter(b=>b.checkIn<=ds&&b.checkOut>=ds&&b.status!=='cancelled');
      if(filterPropId)bksOnDay=bksOnDay.filter(b=>b.propId===filterPropId);
      if(bksOnDay.length){
        const visible=bksOnDay.slice(0,2);
        const extra=bksOnDay.length-2;
        bkBarsHtml='<div class="cal-bk-bars">';
        visible.forEach(b=>{
          const clr=propBarColor(b.propId);
          const isStart=b.checkIn===ds,isEnd=b.checkOut===ds;
          const isSingle=isStart&&isEnd;
          const segCls=isSingle?'bk-seg-single':isStart?'bk-seg-start':isEnd?'bk-seg-end':'bk-seg-mid';
          const prop=D.props.find(x=>x.id===b.propId);
          const label=isStart&&prop?prop.name.slice(0,8):'';
          bkBarsHtml+='<div class="bk-seg '+segCls+'" style="background:'+clr.bg+';border:1px solid '+clr.border+';color:'+clr.text+'" onclick="event.stopPropagation();openBookingDetail(\''+b.id+'\')">'+esc(label)+'</div>';
        });
        if(extra>0)bkBarsHtml+='<div style="font-size:8px;color:var(--text3);font-weight:700;padding:0 2px">+'+extra+'</div>';
        bkBarsHtml+='</div>';
      }
    }

    // Cleaning pills for this day
    let ss=D.sessions.filter(s=>s.date===ds);
    if(filterPropId)ss=ss.filter(s=>s.propId===filterPropId);
    if(!showCleanings)ss=[];

    let inner='<div class="cal-num">'+c.d+'</div>'+bkBarsHtml;
    if(ss.length){
      const pills=ss.slice(0,2).map(s=>{const p=D.props.find(x=>x.id===s.propId);let cls='pc-'+propColorIdx(s.propId);if(s.status==='cancelled')cls='b-cancelled';else if(s.status==='done')cls='b-done';return'<div class="cal-pill '+cls+'">'+esc(p?p.name.slice(0,9):'?')+'</div>';}).join('');
      const more=ss.length>2?'<div class="cal-pill b-past">+'+(ss.length-2)+'</div>':'';
      inner+='<div class="cal-prop-pills">'+pills+more+'</div>';
    }

    const hasContent=ss.length>0||(showBookings&&D.bookings.some(b=>b.checkIn<=ds&&b.checkOut>=ds&&b.status!=='cancelled'&&(!filterPropId||b.propId===filterPropId)));
    return'<div class="cal-day'+(isT?' today':'')+(hasContent?' has-sess':'')+'"'
      +(hasContent?' onclick="openDay(\''+ds+'\')"':'')

}

function renderCalendarWeek(){
  if(!calWeekStart)calWeekStart=startOfWeek();
  const ws=calWeekStart,we=addDays(ws,6),td=today();
  const filterPropId=calFilter.startsWith('prop-')?calFilter.slice(5):null;
  const showBookings=calFilter==='all'||filterPropId;
  const showCleanings=calFilter==='all'||calFilter==='cleanings'||filterPropId;
  let h='<div class="week-nav">'
    +'<button class="week-nav-btn" onclick="calWeekPrev()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>'
    +'<div style="display:flex;flex-direction:column;align-items:center;gap:3px">'
    +'<span class="week-nav-title">'+fmtDateRange(ws,we)+'</span>'
    +(ws===startOfWeek()?'':'<button class="week-today-btn" onclick="calWeekStart=startOfWeek();render()">This week</button>')
    +'</div>'
    +'<button class="week-nav-btn" onclick="calWeekNext()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></button>'
    +'</div>';
  for(let i=0;i<7;i++){
    const ds=addDays(ws,i);
    const isT=ds===td;
    const dayName=fmtDayName(ds);
    h+='<div class="week-day-row">'
      +'<div class="week-day-header"><span class="week-day-name'+(isT?' is-today':'')+'">'+dayName+(isT?' — Today':'')+'</span><div class="week-day-line"></div></div>';
    // Bookings on this day
    if(showBookings){
      let bks=D.bookings.filter(b=>b.checkIn<=ds&&b.checkOut>=ds&&b.status!=='cancelled');
      if(filterPropId)bks=bks.filter(b=>b.propId===filterPropId);
      bks.forEach(b=>{
        const prop=D.props.find(x=>x.id===b.propId);
        const clr=propBarColor(b.propId);
        const nights=nightsBetween(b.checkIn,b.checkOut);
        const isStart=b.checkIn===ds,isEnd=b.checkOut===ds;
        const posLabel=isStart&&isEnd?'Single night':isStart?'Check-in':isEnd?'Check-out':'Staying';
        h+='<div class="bk-card" style="background:'+clr.bg+';border-color:'+clr.border+'" onclick="openBookingDetail(\''+b.id+'\')">'
          +'<div class="bk-card-body">'
          +'<div class="bk-card-prop" style="color:'+clr.text+'">'
          +esc(prop?prop.name:'?')
          +platformBadge(b.platform,b.agencyName)
          +'</div>'
          +'<div class="bk-card-dates" style="color:'+clr.text+';opacity:0.7">'+fmtDate(b.checkIn)+' → '+fmtDate(b.checkOut)+'</div>'
          +'<div class="bk-card-meta">'
          +'<span class="bk-nights">'+nights+' night'+(nights!==1?'s':'')+'</span>'
          +(b.totalPrice?'<span style="font-size:11px;font-weight:800;color:'+clr.text+';font-family:\'DM Mono\',monospace">€'+b.totalPrice.toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:2})+'</span>':'')
          +(b.guestName?'<span style="font-size:10px;color:var(--text2);font-weight:600">👤 '+esc(b.guestName)+'</span>':'')
          +'<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;background:'+clr.border+';color:#fff;opacity:0.85">'+posLabel+'</span>'
          +'</div>'
          +'</div>'
          +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="'+clr.border+'" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>'
          +'</div>';
      });
    }
    // Cleanings
    if(showCleanings){
      let ss=D.sessions.filter(s=>s.date===ds).sort((a,b)=>a.time.localeCompare(b.time));
      if(filterPropId)ss=ss.filter(s=>s.propId===filterPropId);
      if(ss.length)h+=ss.map(s=>sessCard(s,false)).join('');
    }
    // Empty state
    const hasBks=showBookings&&D.bookings.some(b=>b.checkIn<=ds&&b.checkOut>=ds&&b.status!=='cancelled'&&(!filterPropId||b.propId===filterPropId));
    const hasSess=showCleanings&&D.sessions.some(s=>s.date===ds&&(!filterPropId||s.propId===filterPropId));
    if(!hasBks&&!hasSess){
      h+='<div class="week-day-free">'+(calFilter==='cleanings'?'No cleanings':'Nothing scheduled')+'</div>';
    }
    h+='</div>';
  }
  return h;
}

function calPrev(){calM--;if(calM<0){calM=11;calY--;}render()}
function calNext(){calM++;if(calM>11){calM=0;calY++;}render()}
function calWeekPrev(){calWeekStart=addDays(calWeekStart,-7);render()}
function calWeekNext(){calWeekStart=addDays(calWeekStart,7);render()}
function openDay(ds){
  const ss=D.sessions.filter(s=>s.date===ds).sort((a,b)=>a.time.localeCompare(b.time));
  const bks=D.bookings.filter(b=>b.checkIn<=ds&&b.checkOut>=ds&&b.status!=='cancelled');
  if(!ss.length&&!bks.length)return;
  if(ss.length===1&&!bks.length){openSess(ss[0].id);return;}
  if(bks.length===1&&!ss.length){openBookingDetail(bks[0].id);return;}
  let h='';
  if(bks.length){
    h+='<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Bookings</div>';
    h+=bks.map(b=>{
      const p=D.props.find(x=>x.id===b.propId);
      const clr=propBarColor(b.propId);
      return'<div class="bk-card" style="background:'+clr.bg+';border-color:'+clr.border+';margin-bottom:8px" onclick="closeModal();openBookingDetail(\''+b.id+'\')">'
        +'<div class="bk-card-body"><div class="bk-card-prop" style="color:'+clr.text+'">'+esc(p?p.name:'?')+platformBadge(b.platform,b.agencyName)+'</div>'
        +'<div class="bk-card-dates" style="color:'+clr.text+';opacity:0.7">'+fmtDate(b.checkIn)+' → '+fmtDate(b.checkOut)+'</div></div>'
        +'</div>';
    }).join('');
  }
  if(ss.length){
    h+='<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin:'+(bks.length?'12px':'0')+' 0 8px">Cleanings</div>';
    h+=ss.map(s=>{const p=D.props.find(x=>x.id===s.propId);const cln=(s.cleanerIds||[]).map(id=>D.cleaners.find(c=>c.id===id)).filter(Boolean);const tags=cln.map(c=>'<span class="badge tc-'+colorFor(c.name)+'">'+esc(c.name)+'</span>').join('');const sb=s.status==='done'?'<span class="badge b-done">Done</span>':s.status==='cancelled'?'<span class="badge b-cancelled">Cancelled</span>':'';return'<div class="card card-tap card-clean" onclick="closeModal();openSess(\''+s.id+'\')" style="margin-bottom:8px;padding:12px 14px"><div class="sess-prop">'+esc(p?p.name:'?')+sb+'</div>'+(s.time?'<div class="sess-date">'+s.time+'</div>':'')+'<div class="sess-tags">'+tags+'</div></div>';}).join('');
  }
  showModal('<div class="modal-handle"></div><div class="modal-title">'+fmtFull(ds)+'</div>'+h+'<button class="btn btn-ghost" style="margin-top:6px" onclick="closeModal()">Close</button>');
}

function showScheduleModal(){
  showModal('<div class="modal-handle"></div><div class="modal-title">Send schedule</div>'

    +'<button class="period-btn" onclick="sendScheduleWA(\'tomorrow\')"><span class="period-btn-icon">📆</span>Tomorrow</button>'
    +'<button class="period-btn" onclick="sendScheduleWA(\'this_week\')"><span class="period-btn-icon">📋</span>This week</button>'
    +'<button class="period-btn" onclick="sendScheduleWA(\'next_week\')"><span class="period-btn-icon">🗓</span>Next week</button>'
    +'</div>'
    +'<button class="btn btn-ghost" style="margin-top:8px" onclick="closeModal()">Cancel</button>');

function sendScheduleWA(period){
  let s1,s2,title;
  const t=today(),sow=startOfWeek(),eow=endOfWeek();
  if(period==='today'){s1=s2=t;title='Today — '+fmtDate(t);}
  else if(period==='tomorrow'){s1=s2=addDays(t,1);title='Tomorrow — '+fmtDate(addDays(t,1));}
  else if(period==='this_week'){s1=sow;s2=eow;title='This Week  •  '+fmtDateRange(sow,eow);}
  else{s1=addDays(eow,1);s2=addDays(eow,7);title='Next Week  •  '+fmtDateRange(addDays(eow,1),addDays(eow,7));}
  const sessions=D.sessions.filter(s=>s.date>=s1&&s.date<=s2&&s.status==='scheduled').sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  if(!sessions.length){closeModal();toast('No sessions scheduled for this period');return;}
  let msg='🏡 *SeraVillas — Cleaning Schedule*\n📅 *'+title+'*\n\n';
  let ld='';
  sessions.forEach(s=>{
    const p=D.props.find(x=>x.id===s.propId);
    const cleaners=(s.cleanerIds||[]).map(id=>D.cleaners.find(c=>c.id===id)).filter(Boolean);
    if(s.date!==ld){msg+='*'+fmtDate(s.date)+'*\n';ld=s.date;}
    msg+='📍 '+(p?p.name:'?');if(s.time)msg+=' · '+s.time;msg+='\n';
    if(cleaners.length)msg+='👤 '+cleaners.map(c=>c.name).join(', ')+'\n';
    if(s.note)msg+='📝 '+s.note+'\n';
    msg+='\n';
  });
  msg+=sessions.length+' session'+(sessions.length>1?'s':'')+' total\n_Sent via SeraVillas_';
  closeModal();
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

  window._bkPlatform=p;

    const matches=(c.textContent==='Airbnb'&&p==='airbnb')||(c.textContent==='Booking.com'&&p==='booking')||(c.textContent==='Agency'&&p==='agency');
    c.classList.toggle('on',matches);
  });
  const af=document.getElementById('bk-agency-field');

function saveNewBooking(){
  const propId=(document.getElementById('bk-prop')||{}).value||'';
  const checkIn=(document.getElementById('bk-checkin')||{}).value||'';
  const checkOut=(document.getElementById('bk-checkout')||{}).value||'';
  if(!propId){toast('Please select a property');return;}
  if(!checkIn||!checkOut){toast('Please set check-in and check-out dates');return;}
  if(checkOut<=checkIn){toast('Check-out must be after check-in');return;}
  const platform=window._bkPlatform||'airbnb';
  const agencyName=platform==='agency'?((document.getElementById('bk-agency')||{}).value||'').trim():'';
  const guestName=((document.getElementById('bk-guest')||{}).value||'').trim();
  const guestCount=parseInt((document.getElementById('bk-gcount')||{}).value)||0;
  const totalPrice=parseFloat((document.getElementById('bk-rate')||{}).value)||0;
  const notes=((document.getElementById('bk-notes')||{}).value||'').trim();
  const scheduleClean=(document.getElementById('bk-clean-toggle')||{}).checked;
  const bkId=uid();
  let linkedCleaningId='';
  if(scheduleClean){

    D.sessions.push({id:cid,propId,date:checkOut,time:'',cleanerIds:[],status:'scheduled',note:'Checkout cleaning — '+fmtDate(checkIn)+' booking'});

  D.bookings.push({id:bkId,propId,platform,agencyName,checkIn,checkOut,guestName,guestCount,totalPrice,notes,status:'confirmed',linkedCleaningId});
  save();closeModal();render();
  toast('Booking saved'+(scheduleClean?' + cleaning scheduled':'')+'!');
}

/* ── TASKS TAB ── */
/* Priority config */
const PRIO_CFG = {
  high:   {bg:'var(--red-bg)',    border:'var(--red-border)',    text:'var(--red-text)',    dot:'var(--red)',    label:'High',   badgeCls:'pb-high'},
  medium: {bg:'var(--amber-bg)',  border:'var(--amber-border)',  text:'var(--amber-text)',  dot:'var(--amber)',  label:'Medium', badgeCls:'pb-medium'},
  low:    {bg:'var(--purple-bg)', border:'var(--purple-border)', text:'var(--purple-text)', dot:'var(--purple)', label:'Low',    badgeCls:'pb-low'},
};

function projName(id){const p=D.projects.find(x=>x.id===id);return p?p.name:'';}

function calcWeekScore(){
  const total=D.tasks.length;if(!total)return 0;
  return Math.round(D.tasks.filter(t=>t.done).length/total*100);
}
function calcTodayTimeEst(tasks){
  let mins=0,hasAny=false;
  tasks.forEach(t=>{if(!t.timeEst)return;hasAny=true;const e=t.timeEst.toLowerCase();const h=e.match(/(\d+\.?\d*)\s*h/);const m=e.match(/(\d+)\s*m/);if(h)mins+=parseFloat(h[1])*60;if(m)mins+=parseInt(m[1]);});
  if(!hasAny||mins===0)return null;
  if(mins<60)return mins+'m';
  const h=Math.floor(mins/60);const m=mins%60;return h+'h'+(m?m+'m':'');
}

function renderTasks(){
  D.tasks.forEach(migrateTask);
  if(tasksTab==='tasks')tasksTab='today'; // backward compat
  const mainHtml='<div class="seg-ctrl">'
    +'<button class="seg-btn'+(tasksTab==='today'?' active':'')+'" onclick="tasksTab=\'today\';render()">Today</button>'
    +'<button class="seg-btn'+(tasksTab==='ops'?' active':'')+'" onclick="tasksTab=\'ops\';render()">Ops</button>'
    +'<button class="seg-btn'+(tasksTab==='growth'?' active':'')+'" onclick="tasksTab=\'growth\';render()">Growth</button>'
    +'</div>';
  let body='';
  if(tasksTab==='today')      body=renderToday();
  else if(tasksTab==='ops')   body=renderOps();
  else body=renderGrowth();
  return mainHtml+body;
}

/* ── TODAY ── */
function renderToday(){
  D.tasks.forEach(migrateTask);
  const focusTasks=D.tasks.filter(t=>t.inFocus&&!t.done);
  const focusDone=D.tasks.filter(t=>t.inFocus&&t.done&&t.completedAt===today()).length;
  const totalFocus=focusTasks.length+focusDone;
  const weekScore=calcWeekScore();
  const timeEst=calcTodayTimeEst(focusTasks);
  const overdue=D.tasks.filter(t=>!t.done&&!t.inFocus&&(t.priority==='high'||t.urgent)&&t.dueDate&&t.dueDate<today());
  let h='<div class="today-stats">'
    +'<div class="today-stat"><div class="today-stat-n" style="color:var(--accent)">'+focusDone+'<span style="font-size:12px;color:var(--text3)">/'+(totalFocus||'—')+'</span></div><div class="today-stat-l">Focus done</div></div>'
    +'<div class="today-stat"><div class="today-stat-n" style="color:var(--purple)">'+weekScore+'<span style="font-size:12px">%</span></div><div class="today-stat-l">Week score</div></div>'
    +'<div class="today-stat"><div class="today-stat-n" style="color:var(--amber)">'+(timeEst||'—')+'</div><div class="today-stat-l">Est. today</div></div>'
    +'</div>';
  if(D.focusSetDate!==today()||totalFocus===0){
    h+='<div class="ritual-card" onclick="openMorningRitual()">'
      +'<div style="font-size:24px;flex-shrink:0">☀️</div>'
      +'<div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--purple-text)">Plan your day</div>'
      +'<div style="font-size:11px;color:var(--text2);margin-top:2px;font-weight:500">Pick 3–5 tasks to focus on today</div></div>'
      +'<div style="font-size:13px;color:var(--purple)">→</div>'
      +'</div>';
  }
  if(totalFocus>0){
    const pct=Math.round(focusDone/totalFocus*100);
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
      +'<div class="focus-lbl" style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em">⭐ Today\'s focus</div>'
      +'<button class="btn btn-ghost btn-sm" style="font-size:11px;padding:5px 12px" onclick="openMorningRitual()">Edit</button></div>';
    h+='<div class="progress-wrap" style="margin-bottom:12px">'
      +'<div class="progress-top"><span class="progress-title">'+focusDone+' of '+totalFocus+' done</span><span class="progress-count">'+pct+'%</span></div>'
      +'<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%"></div></div>'
      +'</div>';
    D.tasks.filter(t=>t.inFocus&&t.done&&t.completedAt===today()).forEach(t=>{h+=taskSwipeWrap(t);});
    focusTasks.forEach(t=>{h+=taskSwipeWrap(t);});
  }
  if(overdue.length){
    h+='<div class="task-group-label tgl-high" style="margin-top:16px;color:var(--red)">⚠️ Overdue — needs attention</div>';
    overdue.forEach(t=>{h+=taskSwipeWrap(t);});
  }
  if(totalFocus===0&&overdue.length===0)
    h+='<div class="empty" style="padding:28px 0">Nothing focused yet.<br>Plan your day above ☀️</div>';
  return h;
}

/* ── OPS ── */
function renderOps(){
  D.tasks.forEach(migrateTask);
  const opsTasks=D.tasks.filter(t=>t.type==='ops'||!t.type);
  const propFilterHtml='<div class="prop-filter-row">'
    +'<div class="prop-fpill'+(opsFilter==='all'?' active':'')+'" onclick="opsFilter=\'all\';render()">All</div>'
    +D.props.map(p=>'<div class="prop-fpill'+(opsFilter===p.id?' active':'')+'" onclick="opsFilter=\''+p.id+'\';render()">'+esc(p.name)+'</div>').join('')
    +'</div>';
  let filtered=opsFilter==='all'?opsTasks:opsTasks.filter(t=>t.propId===opsFilter);
  const pinned=filtered.filter(t=>t.pinned&&!t.done);
  const high=filtered.filter(t=>!t.done&&!t.pinned&&t.priority==='high');
  const med=filtered.filter(t=>!t.done&&!t.pinned&&t.priority==='medium');
  const low=filtered.filter(t=>!t.done&&!t.pinned&&(t.priority==='low'||!t.priority));
  // Show ALL completed tasks (all types) filtered by property selection only
  const done=D.tasks.filter(t=>t.done&&(opsFilter==='all'||t.propId===opsFilter))
    .sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  let h=propFilterHtml;
  if(pinned.length)h+='<div class="task-group-label tgl-pinned">📌 Pinned</div>'+pinned.map(t=>taskSwipeWrap(t)).join('');
  if(high.length)h+='<div class="task-group-label tgl-high">High priority</div>'+high.map(t=>taskSwipeWrap(t)).join('');
  if(med.length)h+='<div class="task-group-label tgl-medium">Medium</div>'+med.map(t=>taskSwipeWrap(t)).join('');
  if(low.length)h+='<div class="task-group-label tgl-low">Low priority</div>'+low.map(t=>taskSwipeWrap(t)).join('');
  if(!pinned.length&&!high.length&&!med.length&&!low.length)
    h+='<div class="empty" style="padding:20px 0">No operational tasks — all clear ✓</div>';
  if(done.length){
    h+='<div class="task-group-label tgl-done" style="cursor:pointer;margin-top:16px" onclick="toggleDoneSection()">'
      +'Completed ('+done.length+')<span id="done-toggle-icon" style="margin-left:auto">'+(window._showDone?'▲':'▼')+'</span></div>';
    if(window._showDone)h+=done.map(t=>taskSwipeWrap(t)).join('');
  }
  h+='<div class="task-quick-add" style="margin-top:12px">'
    +'<input type="text" id="task-input" placeholder="Quick add ops task..." onkeydown="if(event.which===13)quickAddTask(\'ops\')">'
    +'<button class="btn btn-purple-sm btn-sm" onclick="openNewTaskModal(\'\',\'ops\',\'\')">+ Full</button></div>';
  return h;
}

/* ── GROWTH ── */
const PROJ_COLORS=['#111111','#1a7a5e','#b06800','#c0392b','#555555','#1a5a9a'];

function renderGrowth(){
  D.tasks.forEach(migrateTask);
  const growthTasks=D.tasks.filter(t=>t.type==='growth');
  let h='';
  if(D.projects.length===0&&growthTasks.length===0){
    h+='<div class="empty" style="padding:24px 0">No growth projects yet.<br>Create one below to organise your business tasks.</div>';
  }
  D.projects.forEach(proj=>{
    const pt=growthTasks.filter(t=>t.projectId===proj.id);
    const ptDone=pt.filter(t=>t.done).length;
    const pct=pt.length?Math.round(ptDone/pt.length*100):0;
    const open=_openProjects.has(proj.id);
    h+='<div class="proj-block">'
      +'<div class="proj-hdr" onclick="toggleProject(\''+proj.id+'\')">'
      +'<div class="proj-clr" style="background:'+esc(proj.color)+'"></div>'
      +'<div class="proj-nm">'+esc(proj.name)+'</div>'
      +'<div class="proj-ct">'+ptDone+'/'+pt.length+'</div>'
      +'<div class="proj-chev'+(open?' open':'')+'">▾</div></div>'
      +'<div class="proj-pbar"><div class="proj-pfill" style="width:'+pct+'%;background:'+esc(proj.color)+'"></div></div>';
    if(open){
      h+='<div class="proj-bdy">';
      if(pt.length===0)h+='<div style="font-size:12px;color:var(--text3);padding:8px 0;font-style:italic">No tasks yet</div>';
      pt.forEach(t=>{
        h+='<div class="proj-trow" onclick="openTaskDetail(\''+t.id+'\')">'
          +'<div class="proj-mchk'+(t.done?' done':'')+'" onclick="event.stopPropagation();startComplete(\''+t.id+'\')">'+(t.done?'✓':'')+'</div>'
          +'<div style="flex:1;font-size:12px;'+(t.done?'text-decoration:line-through;color:var(--text3)':'')+'">'+esc(t.text)+'</div>'
          +(t.priority==='high'?'<div style="width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0"></div>':t.priority==='medium'?'<div style="width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0"></div>':'')
          +(t.inFocus?'<div style="font-size:11px;color:var(--amber)">⭐</div>':'')
          +'</div>';
      });
      h+='<div class="proj-add-row" onclick="openNewTaskModal(\'\',\'growth\',\''+proj.id+'\')"><span style="font-size:15px;color:var(--purple)">+</span> Add task</div>';
      h+='</div>';
    }
    h+='</div>';
    // Edit/delete project row (only in open state)
    if(open){
      h+='<div style="display:flex;gap:6px;margin-top:-6px;margin-bottom:10px;padding:0 2px">'
        +'<button class="btn btn-ghost btn-sm" style="flex:1" onclick="openEditProject(\''+proj.id+'\')">Rename project</button>'
        +'<button class="btn btn-red-sm btn-sm" onclick="delProject(\''+proj.id+'\')">Delete</button>'
        +'</div>';
    }
  });
  // Unassigned growth tasks
  const unassigned=growthTasks.filter(t=>!t.projectId||!D.projects.find(p=>p.id===t.projectId));
  if(unassigned.length){
    h+='<div class="task-group-label tgl-low" style="margin-top:4px">Unassigned growth tasks</div>';
    unassigned.forEach(t=>{h+=taskSwipeWrap(t);});
  }
  h+='<div style="display:flex;gap:8px;margin-top:14px">'
    +'<button class="btn btn-primary btn-sm" style="flex:1" onclick="openNewProject()">+ New project</button>'
    +'<button class="btn btn-ghost btn-sm" style="flex:1" onclick="openNewTaskModal(\'\',\'growth\',\'\')">+ Add task</button>'
    +'</div>';
  // Completed growth tasks
  const doneGrowth=growthTasks.filter(t=>t.done).sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  if(doneGrowth.length){
    h+='<div class="task-group-label tgl-done" style="cursor:pointer;margin-top:16px" onclick="toggleDoneSection()">'
      +'Completed ('+doneGrowth.length+')<span id="done-toggle-icon" style="margin-left:auto;font-size:12px">'+(window._showDone?'▲':'▼')+'</span></div>';
    if(window._showDone)h+=doneGrowth.map(t=>taskSwipeWrap(t)).join('');
  }
  return h;
}

function toggleProject(id){if(_openProjects.has(id))_openProjects.delete(id);else _openProjects.add(id);render();}

function openNewProject(){

function saveNewProject(){

function openEditProject(id){

function saveEditProject(id){
  const proj=D.projects.find(x=>x.id===id);if(!proj)return;

  if(!name.trim()){alert('Please enter a name.');return;}

function delProject(id){

  D.tasks.forEach(t=>{if(t.projectId===id)t.projectId='';});
  _openProjects.delete(id);save();render();toast('Project deleted');
}

/* ── MORNING RITUAL ── */
function openMorningRitual(){
  const all=D.tasks.filter(t=>!t.done).sort((a,b)=>{const o={high:0,medium:1,low:2};return(o[a.priority]||2)-(o[b.priority]||2);});
  window._ritualSel=new Set(D.tasks.filter(t=>t.inFocus&&!t.done).map(t=>t.id));
  const renderList=()=>{
    if(all.length===0)return'<div class="empty">No open tasks to select from.</div>';
    return all.map(t=>{
      const sel=window._ritualSel.has(t.id);
      const propB=t.propId?'<span class="badge pc-'+propColorIdx(t.propId)+'" style="font-size:10px;padding:2px 6px">'+esc(propName(t.propId))+'</span>':'';
      const typeB='<span class="badge" style="font-size:10px;padding:2px 6px;background:'+(t.type==='growth'?'var(--purple-bg)':'var(--accent-bg)')+';color:'+(t.type==='growth'?'var(--purple-text)':'var(--accent-text)')+'">'+( t.type==='growth'?(projName(t.projectId)||'Growth'):'Ops')+'</span>';
      return'<div onclick="toggleRitual(\''+t.id+'\')" style="display:flex;align-items:flex-start;gap:10px;padding:10px;background:'+(sel?'var(--purple-bg)':'var(--surface2)')+';border-radius:var(--radius-sm);margin-bottom:6px;border:1.5px solid '+(sel?'var(--purple-border)':'transparent')+';cursor:pointer;transition:all 0.12s">'
        +'<div style="width:20px;height:20px;border-radius:50%;border:2px solid '+(sel?'var(--purple)':'var(--border2)')+';background:'+(sel?'var(--purple)':'none')+';flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff">'+(sel?'✓':'')+'</div>'
        +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;margin-bottom:3px">'+esc(t.text)+'</div>'
        +'<div style="display:flex;gap:4px;flex-wrap:wrap">'+typeB+propB+'</div></div></div>';
    }).join('');
  };
  window._renderRitualList=renderList;
  showModal('<div class="modal-handle"></div><div class="modal-title">☀️ Plan your day</div>'
    +'<div style="font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:500">Pick up to 5 tasks to focus on today.</div>'
    +'<div id="ritual-count" style="font-size:11px;font-weight:700;color:var(--purple);margin-bottom:10px">'+window._ritualSel.size+'/5 selected</div>'
    +'<div id="ritual-list">'+renderList()+'</div>'
    +'<div style="display:flex;gap:8px;margin-top:14px"><button class="btn btn-primary" style="flex:1" onclick="saveRitual()">Set today\'s focus</button><button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button></div>');
}
function toggleRitual(id){
  if(window._ritualSel.has(id)){window._ritualSel.delete(id);}
  else{if(window._ritualSel.size>=5){toast('Max 5 tasks for focus');return;}window._ritualSel.add(id);}
  const c=document.getElementById('ritual-count');if(c)c.textContent=window._ritualSel.size+'/5 selected';
  const l=document.getElementById('ritual-list');if(l)l.innerHTML=window._renderRitualList();
}
function saveRitual(){
  D.tasks.forEach(t=>{t.inFocus=window._ritualSel.has(t.id)&&!t.done;});
  D.focusSetDate=today();save();closeModal();tasksTab='today';render();toast('Today\'s focus set!');
}

function migrateTask(t){
  if(!t.priority) t.priority = t.urgent ? 'high' : 'low';
  if(t.pinned===undefined)  t.pinned   = false;
  if(t.note===undefined)    t.note     = '';
  if(t.dueDate===undefined) t.dueDate  = '';
  if(t.timeEst===undefined) t.timeEst  = '';
  if(t.photo===undefined)   t.photo    = null;
  if(t.inFocus===undefined) t.inFocus  = false;
  if(t.completedAt===undefined) t.completedAt = '';
  if(!t.type) t.type='ops';
  if(!t.projectId) t.projectId='';

/* ── Completion animation ── */
function startComplete(id){
  const t=D.tasks.find(x=>x.id===id);
  if(!t) return;
  if(t.done){ t.done=false; t.completedAt=''; save(); render(); return; }
  const el=document.getElementById('tb-'+id);
  if(!el){ toggleTaskDone(id); return; }

  // Haptic tap on mobile
  if(navigator.vibrate) navigator.vibrate(12);

  // Animate the checkbox: pop + fill + draw checkmark
  const chkEl=el.querySelector('.task-bubble-check');
  const svgEl=el.querySelector('.chk-svg');
  const markEl=el.querySelector('.chk-mark');
  if(chkEl) chkEl.classList.add('filling');
  if(svgEl){ svgEl.classList.remove('popping'); void svgEl.offsetWidth; svgEl.classList.add('popping'); }
  if(markEl){ markEl.style.transition='stroke-dashoffset 0.2s ease 0.05s'; markEl.style.strokeDashoffset='0'; }

  // Burst particles from checkbox centre
  const chkRect=(chkEl||el).getBoundingClientRect();
  spawnBurst(chkRect.left+chkRect.width/2, chkRect.top+chkRect.height/2);

  // Card sweeps right after brief pause
  setTimeout(()=>el.classList.add('completing'), 140);
  setTimeout(()=>toggleTaskDone(id), 600);
}

function spawnBurst(cx,cy){
  const colors=['var(--accent)','var(--amber)','var(--text)','#5dcaa5','#efa040','#888888','#1a7a5e'];
  const count=14;
  for(let i=0;i<count;i++){
    const angle=(360/count)*i+(Math.random()*18-9);
    const rad=angle*Math.PI/180;
    const dist=42+Math.random()*38;
    const tx=Math.cos(rad)*dist;
    const ty=Math.sin(rad)*dist;
    const size=3+Math.random()*5;
    const isSquare=i%3===2;
    const dur=0.42+Math.random()*0.28;
    const delay=Math.random()*0.07;
    const p=document.createElement('div');
    p.style.cssText='position:fixed;left:'+cx+'px;top:'+cy+'px;width:'+size+'px;height:'+size+'px'
      +';border-radius:'+(isSquare?'3px':'50%')+';background:'+colors[i%colors.length]
      +';pointer-events:none;z-index:999'
      +';--tx:'+tx.toFixed(1)+'px;--ty:'+ty.toFixed(1)+'px'
      +';animation:particleBurst '+dur.toFixed(2)+'s cubic-bezier(0.25,0.46,0.45,0.94) '+delay.toFixed(2)+'s forwards';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),(dur+delay)*1000+120);
  }
}

function deleteSupply(id){D.supplies=D.supplies.filter(x=>x.id!==id);save();render();}
function resetSupplies(){D.supplies.forEach(s=>{s.have=0;});save();render();toast('Supplies reset!');}
function toggleSupply(id){const s=D.supplies.find(x=>x.id===id);if(!s)return;s.checked=!s.checked;save();render();}

/* ── SCRATCHPAD ── */
function renderScratch(){
  return'<div style="font-size:12px;color:var(--text3);margin-bottom:12px;font-weight:600">A free space for notes, ideas, anything.</div>'
    +'<textarea class="scratch-area" id="scratch-area" placeholder="Start typing..." oninput="saveScratch()">'+esc(D.scratch)+'</textarea>';
}
function saveScratch(){const el=document.getElementById('scratch-area');if(el){D.scratch=el.value;save();}}

/* ── ISSUE MODALS ── */
function openAddIssue(){openAddIssueFor('');}
function openAddIssueFor(propId){
  const po='<option value="">No specific property</option>'+D.props.map(p=>'<option value="'+p.id+'"'+(propId===p.id?' selected':'')+'>'+esc(p.name)+'</option>').join('');
  showModal('<div class="modal-handle"></div><div class="modal-title">Log an issue</div>'
    +'<div class="field"><label>What is the issue?</label><input type="text" id="iss-title" placeholder="e.g. Broken boiler"></div>'
    +'<div class="field"><label>Property</label><select id="iss-prop">'+po+'</select></div>'
    +'<div class="field"><label>Details <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text3)">(optional)</span></label><textarea id="iss-note" placeholder="Any extra details..." style="height:68px"></textarea></div>'
    +'<div style="display:flex;gap:8px;margin-top:6px"><button class="btn btn-amber-sm" style="flex:1;padding:14px" onclick="saveIssue()">Save issue</button><button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button></div>');
}
function saveIssue(){
  const title=(document.getElementById('iss-title')||{}).value||'';
  const propId=(document.getElementById('iss-prop')||{}).value||'';
  const note=(document.getElementById('iss-note')||{}).value||'';
  if(!title.trim()){alert('Please describe the issue.');return;}
  D.issues.push({id:uid(),title:title.trim(),propId,note,status:'open',createdAt:today(),photos:[]});
  save();closeModal();render();toast('Issue logged!');
}
function openIssue(id){
  const i=D.issues.find(x=>x.id===id);if(!i)return;
  window._iid=id;
  const p=D.props.find(x=>x.id===i.propId);
  const resolved=i.status==='resolved';
  let photosHtml='<div class="photos-row" style="margin-bottom:8px">';
  (i.photos||[]).forEach(function(ph,idx2){
    photosHtml+='<img class="photo-thumb" src="'+ph+'" data-view-issue-photo="'+idx2+'" alt="Issue photo" style="width:68px;height:68px;border-radius:10px;object-fit:cover;cursor:pointer;border:1px solid var(--border)">';
  });
  if((i.photos||[]).length<3){
    photosHtml+='<div class="photo-add-btn" data-add-issue-photo="1" style="width:68px;height:68px;border-radius:10px;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:22px;background:var(--surface2)">+</div>';
  }
  photosHtml+='</div>';
  const statusBtn=resolved
    ?'<button class="btn btn-amber-sm btn-sm" data-issue-status="open">Reopen</button>'
    :'<button class="btn btn-accent-sm btn-sm" data-issue-status="resolved">Mark resolved</button>';
  showModal('<div class="modal-handle"></div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
    +'<div class="modal-title" style="margin-bottom:0">'+esc(i.title)+'</div>'
    +'<div style="display:flex;gap:6px"><span class="badge '+(resolved?'b-resolved':'b-open')+'">'+(resolved?'Resolved':'Open')+'</span>'
    +'<button class="btn btn-ghost btn-sm" onclick="openEditIssue(window._iid)">Edit</button></div></div>'
    +(p?'<div style="font-size:13px;color:var(--text2);font-weight:600;margin-bottom:10px">'+esc(p.name)+'</div>':'')
    +(i.note?'<div style="font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:12px;font-weight:500">'+esc(i.note)+'</div>':'')
    +'<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px">Photos</div>'
    +photosHtml
    +'<div class="divider"></div><div style="display:flex;gap:8px;flex-wrap:wrap">'
    +statusBtn
    +'<button class="btn btn-red-sm btn-sm" onclick="delIssue(window._iid)">Delete</button>'
    +'<button class="btn btn-ghost btn-sm" onclick="closeModal()">Close</button></div>');
}

function openEditIssue(id){
  const i=D.issues.find(x=>x.id===id);if(!i)return;
  const po='<option value="">No specific property</option>'+D.props.map(p=>'<option value="'+p.id+'"'+(i.propId===p.id?' selected':'')+'>'+esc(p.name)+'</option>').join('');
  showModal('<div class="modal-handle"></div><div class="modal-title">Edit issue</div>'
    +'<div class="field"><label>Title</label><input type="text" id="ei-title" value="'+esc(i.title)+'"></div>'
    +'<div class="field"><label>Property</label><select id="ei-prop">'+po+'</select></div>'
    +'<div class="field"><label>Details</label><textarea id="ei-note" style="height:80px">'+esc(i.note||'')+'</textarea></div>'
    +'<div style="display:flex;gap:8px;margin-top:6px"><button class="btn btn-amber-sm" style="flex:1;padding:14px" onclick="saveEditIssue(\''+id+'\')">Save changes</button><button class="btn btn-ghost" style="flex:1" onclick="openIssue(\''+id+'\')">Cancel</button></div>');
}
function saveEditIssue(id){
  const i=D.issues.find(x=>x.id===id);if(!i)return;
  const title=(document.getElementById('ei-title')||{}).value||'';
  const propId=(document.getElementById('ei-prop')||{}).value||'';
  const note=(document.getElementById('ei-note')||{}).value||'';
  if(!title.trim()){alert('Please enter a title.');return;}
  i.title=title.trim();i.propId=propId;i.note=note;
  save();openIssue(id);render();toast('Issue updated!');
}
function setIssueStatus(id,status){const i=D.issues.find(x=>x.id===id);if(!i)return;i.status=status;save();openIssue(id);render();}
function delIssue(id){if(!confirm('Delete this issue?'))return;D.issues=D.issues.filter(x=>x.id!==id);save();closeModal();render();}
function viewIssuePhoto(id,idx){
  const i=D.issues.find(x=>x.id===id);if(!i||!i.photos[idx])return;
  window._iid=id;window._iidx=idx;
  showModal('<div class="modal-handle"></div><img src="'+i.photos[idx]+'" style="width:100%;max-height:220px;object-fit:contain;border-radius:12px;margin-bottom:14px;background:var(--surface2)" alt="Issue photo">'
    +'<div style="display:flex;gap:8px"><button class="btn btn-danger" style="flex:1" onclick="removeIssuePhoto(window._iid,window._iidx)">Delete</button>'
    +'<button class="btn btn-ghost" style="flex:1" onclick="openIssue(window._iid)">Back</button></div>');
}

function removeIssuePhoto(id,idx){if(!confirm('Delete this photo?'))return;const i=D.issues.find(x=>x.id===id);if(i){i.photos.splice(idx,1);save();openIssue(id);}}

/* ── ADD SESSION ── */
function openAddSessModal(){
  selCleaners=[];
  if(D.props.length===0||D.cleaners.length===0){
    showModal('<div class="modal-handle"></div><div class="modal-title">Add a session</div>'
      +'<div style="font-size:14px;color:var(--text2);margin-bottom:16px;font-weight:500">Add at least one property and one cleaner first.</div>'
      +'<button class="btn btn-primary" onclick="closeModal();go(\'properties\')">Go to Properties</button>');
    return;
  }
  const po='<option value="">Select property...</option>'+D.props.map(p=>'<option value="'+p.id+'">'+esc(p.name)+'</option>').join('');
  const chips=D.cleaners.map(c=>'<button type="button" class="chip" data-id="'+c.id+'" onclick="toggleCleanerModal(\''+c.id+'\')">'+esc(c.name)+'</button>').join('');
  showModal('<div class="modal-handle"></div><div class="modal-title">Add a cleaning session</div>'
    +'<div class="field"><label>Property</label><select id="f-prop">'+po+'</select></div>'
    +'<div class="field"><label>Date</label><input type="date" id="f-date" min="'+today()+'"></div>'
    +'<div class="field"><label>Time</label><input type="time" id="f-time" value="08:00"></div>'
    +'<div class="field"><label>Cleaners</label><div class="chips" id="modal-cleaner-chips" style="margin-top:6px">'+chips+'</div></div>'
    +'<div class="field"><label>Note <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text3)">(optional)</span></label><textarea id="f-note" placeholder="Special instructions..." style="height:68px"></textarea></div>'
    +'<div style="display:flex;gap:8px;margin-top:6px"><button class="btn btn-teal" style="flex:1" onclick="addSessFromModal()">Save session</button><button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button></div>');
}
function toggleCleanerModal(id){
  const i=selCleaners.indexOf(id);
  if(i>=0)selCleaners.splice(i,1);else selCleaners.push(id);
  document.querySelectorAll('#modal-cleaner-chips .chip').forEach(c=>c.classList.toggle('on',selCleaners.includes(c.dataset.id)));
}
function addSessFromModal(){
  const propId=(document.getElementById('f-prop')||{}).value||'';
  const date=(document.getElementById('f-date')||{}).value||'';
  const time=(document.getElementById('f-time')||{}).value||'';
  const note=(document.getElementById('f-note')||{}).value||'';
  const cids=[...selCleaners];
  if(!propId){alert('Please select a property.');return;}
  if(!date){alert('Please pick a date.');return;}
  if(!cids.length){alert('Please select at least one cleaner.');return;}
  D.sessions.push({id:uid(),propId,cleanerIds:cids,date,time,note,status:'scheduled'});
  selCleaners=[];save();closeModal();render();toast('Session saved!');
}

function renderAdd(){
  if(D.props.length===0||D.cleaners.length===0){
    return'<div style="font-size:19px;font-weight:800;letter-spacing:-0.4px;margin-bottom:16px">Add a session</div>'
      +'<div class="card" style="text-align:center;padding:28px 20px"><div style="font-size:14px;color:var(--text2);margin-bottom:16px;font-weight:500">Add at least one property and one cleaner first.</div>'
      +'<button class="btn btn-primary btn-sm" onclick="go(\'properties\')">Go to Properties</button></div>';
  }
  const po='<option value="">Select property...</option>'+D.props.map(p=>'<option value="'+p.id+'">'+esc(p.name)+'</option>').join('');
  const chips=D.cleaners.map(c=>'<button type="button" class="chip'+(selCleaners.includes(c.id)?' on':'')+'" data-id="'+c.id+'" onclick="toggleCleaner(\''+c.id+'\')">'+esc(c.name)+'</button>').join('');
  return'<div style="font-size:19px;font-weight:800;letter-spacing:-0.4px;margin-bottom:20px">Add a cleaning session</div>'

}

/* ── PROPERTY HUB ── */
function renderPropHub(pid){
  const p=D.props.find(x=>x.id===pid);if(!p)return'';
  const uc=D.sessions.filter(s=>s.propId===pid&&s.date>=today()&&s.status==='scheduled').sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const ot=D.tasks.filter(t=>t.propId===pid&&!t.done).sort((a,b)=>(b.urgent?1:0)-(a.urgent?1:0));
  const oi=D.issues.filter(i=>i.propId===pid&&i.status==='open');
  const past=D.sessions.filter(s=>s.propId===pid&&s.date<today()).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
  const ci=propColorIdx(pid);
  let h='<button class="back-btn" onclick="go(\'properties\')">'
    +'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>All properties</button>'
    +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">'
    +'<div class="avatar pc-'+ci+'" style="width:48px;height:48px;border-radius:16px;font-size:16px;font-weight:800;flex-shrink:0">'+avInit(p.name)+'</div>'
    +'<div style="flex:1;min-width:0"><div style="font-size:20px;font-weight:800;letter-spacing:-0.4px">'+esc(p.name)+'</div>'
    +'<div style="font-size:12px;color:var(--text3);font-weight:500;font-family:\'DM Mono\',monospace">'+D.sessions.filter(s=>s.propId===pid).length+' sessions total</div></div>'
    +'<button class="btn btn-ghost btn-sm" onclick="openPropNotes(\''+pid+'\')">Notes</button></div>';
  if(p.notes&&p.notes.trim())h+='<div class="prop-notes-box" style="margin-bottom:16px">'+esc(p.notes)+'</div>';
  h+='<div class="sec sec-gold" style="margin-top:0">Photos</div>'
    +'<div class="photos-row">';
  (p.photos||[]).forEach((photo,idx)=>{h+='<img class="photo-thumb" src="'+photo+'" onclick="viewPhoto(\''+pid+'\','+idx+')" alt="Property photo">';});
  if((p.photos||[]).length<3)h+='<div class="photo-add-btn" onclick="_photoPropId=\''+pid+'\';document.getElementById(\'photo-file\').click()">+</div>';
  h+='</div>';
  h+='<div class="sec sec-teal">Upcoming cleanings</div>'
    +(uc.length===0?'<div class="empty" style="padding:12px 0">None scheduled.</div>':uc.slice(0,4).map(s=>sessCard(s,true)).join(''))
    +'<button class="btn btn-accent-sm btn-sm" style="margin-bottom:4px" onclick="selCleaners=[];go(\'add\')">+ Schedule cleaning</button>';
  h+='<div class="sec sec-purple">Open tasks</div>';

/* ── PHOTOS (property) ── */
function compressImage(file,cb){
  const img=new Image();const reader=new FileReader();
  reader.onload=ev=>{img.onload=()=>{
    const canvas=document.createElement('canvas');
    let w=img.width,hh=img.height;
    if(w>800){hh=hh*800/w;w=800;}if(hh>600){w=w*600/hh;hh=600;}
    canvas.width=Math.round(w);canvas.height=Math.round(hh);
    canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
    cb(canvas.toDataURL('image/jpeg',0.7));
  };img.src=ev.target.result;};
  reader.readAsDataURL(file);
}
function handlePhoto(e){

}

/* ── CLOUD SYNC ENGINE ── */
function setSyncStatus(s,label){
  syncStatus=s;
  ['sync-dot','sync-dot-mobile'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.className='sync-dot '+s;}
  });
  const lbl=document.getElementById('sync-label');
  if(lbl)lbl.textContent=label||{idle:'Not synced',syncing:'Syncing…',ok:'Synced',error:'Sync failed'}[s]||s;
}

async function pushToCloud(){
  if(!SYNC_URL||!SYNC_SECRET)return;
  setSyncStatus('syncing');
  try{
    const res=await fetch(SYNC_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Secret':SYNC_SECRET},
      body:JSON.stringify(D)
    });
    if(res.ok){
      setSyncStatus('ok','Saved to cloud');
      localStorage.setItem(DB+'_lastSync',Date.now().toString());
    } else {
      setSyncStatus('error','Save failed');
    }
  }catch(e){
    setSyncStatus('error','Offline');
  }
}

async function pullFromCloud(){
  if(!SYNC_URL||!SYNC_SECRET)return false;
  setSyncStatus('syncing','Loading…');
  try{
    const res=await fetch(SYNC_URL,{
      method:'GET',
      headers:{'X-Secret':SYNC_SECRET}
    });
    if(!res.ok){setSyncStatus('error','Load failed');return false;}
    const text=await res.text();
    if(!text||text==='null'){setSyncStatus('ok','Cloud empty — using local');return false;}
    const remote=JSON.parse(text);
    // Merge: use remote if it has more bookings or is newer
    const localBks=(D.bookings||[]).length;
    const remoteBks=(remote.bookings||[]).length;
    if(remoteBks>=localBks){
      // Remote is authoritative — load it
      Object.assign(D,remote);
      // Ensure all fields exist
      D.bookings=D.bookings||[];
      D.props=D.props||[];
      D.sessions=D.sessions||[];
      D.tasks=D.tasks||[];
      D.issues=D.issues||[];
      D.supplies=D.supplies||[];
      D.projects=D.projects||[];
      D.cleaners=D.cleaners||[];
      save();
      setSyncStatus('ok','Synced from cloud');
      return true;
    } else {
      // Local has more data — push local to cloud
      setSyncStatus('ok','Local is newer');
      await pushToCloud();
      return false;
    }
  }catch(e){
    setSyncStatus('error','Offline');
    return false;
  }
}

// Debounced auto-push — saves 2s after last change
function schedulePush(){
  if(syncTimeout)clearTimeout(syncTimeout);
  syncTimeout=setTimeout(()=>pushToCloud(),2000);
}

async function syncNow(){
  const pulled=await pullFromCloud();
  if(pulled){render();}
}

// Override save() to also schedule cloud push

  try{localStorage.setItem(DB,JSON.stringify(D));}catch(e){toast('Storage full');}
  schedulePush();
}

async function setupSubmit(){
  const input=document.getElementById('setup-secret');
  const errEl=document.getElementById('setup-error');
  const secret=(input.value||'').trim();
  if(!secret){errEl.textContent='Please enter your access key';return;}
  errEl.textContent='Checking…';
  input.disabled=true;
  // Test the secret by trying a GET request
  try{
    const res=await fetch(SYNC_URL,{method:'GET',headers:{'X-Secret':secret}});
    if(res.status===401){
      errEl.textContent='Wrong access key — please try again';
      input.disabled=false;input.select();return;
    }
    if(!res.ok){
      errEl.textContent='Connection error — check your internet and try again';
      input.disabled=false;return;
    }
    // Success — save secret and continue
    SYNC_SECRET=secret;
    localStorage.setItem('sv_secret',secret);
    errEl.textContent='';
    input.disabled=false;
    hideSetup();
    // Load cloud data
    load();updateHeader();render();
    const pulled=await pullFromCloud();
    if(pulled)render();
    checkReminder();
  }catch(e){
    errEl.textContent='Cannot connect — check your internet connection';
    input.disabled=false;
  }
}
function resetAccess(){
  if(!confirm('This will sign out and clear your access key. You will need to re-enter it to use the app. Continue?'))return;
  localStorage.removeItem('sv_secret');
  SYNC_SECRET='';
  location.reload();
}

load();updateHeader();
// Startup: check if secret exists
if(!SYNC_SECRET){
  // No secret saved — show setup screen
  showSetup();
} else {
  // Secret exists — start normally
  (async()=>{
    render();
    const pulled=await pullFromCloud();
    if(pulled)render();
    checkReminder();
  })();
}
</script>
</body>
</html>
